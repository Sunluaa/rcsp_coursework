databases:
  - name: knowledgebaza-db
    plan: free

services:
  - type: web
    name: knowledgebaza-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: knowledgebaza-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://knowledgebaza-frontend.onrender.com
      - key: STORAGE_PROVIDER
        value: local
      - key: LOCAL_STORAGE_PATH
        value: uploads
      - key: SEED_ADMIN_PASSWORD
        value: Admin12345!
      - key: SEED_EDITOR_PASSWORD
        value: Editor12345!
      - key: SEED_EMPLOYEE_PASSWORD
        value: Employee12345!

  - type: web
    name: knowledgebaza-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://knowledgebaza-backend.onrender.com/api
